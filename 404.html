<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open-Interview</title>
  <script>
    (function() {
      var location = window.location;
      var path = location.pathname;
      var search = location.search;
      var hash = location.hash;
      
      // Store the intended path in sessionStorage
      sessionStorage.setItem('spa-redirect', JSON.stringify({
        path: path,
        search: search,
        hash: hash
      }));
      
      // Redirect to root with spa-redirect flag
      location.replace(
        location.protocol + '//' + location.host + '/?spa-redirect=true'
      );
    })();
  </script>
</head>
<body></body>
</html>
